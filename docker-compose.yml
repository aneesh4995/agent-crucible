services:

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,iam,sts,secretsmanager,cloudwatch,logs
      - DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - "./init/seed-localstack.sh:/etc/localstack/init/ready.d/seed.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sre_runbooks
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre_local
    volumes:
      - "./init/seed-postgres.sql:/docker-entrypoint-initdb.d/seed.sql"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre_runbooks"]
      interval: 10s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.16
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - "./init/seed-vault.sh:/vault/init/seed.sh"
    command: >
      sh -c "vault server -dev &
             sleep 3 &&
             /vault/init/seed.sh &&
             wait"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 10
